<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" role="img" aria-label="Sakura Sparkle banner">
  <defs>
    <linearGradient id="creambg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDFBF7"/>
      <stop offset="50%" stop-color="#FBE4D6"/>
      <stop offset="100%" stop-color="#F4C2C2"/>
    </linearGradient>
    <radialGradient id="petalPink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F4C2C2"/>
      <stop offset="100%" stop-color="#E87B6E" stop-opacity="0.4"/>
    </radialGradient>

    <symbol id="sparkle" viewBox="-10 -10 20 20">
      <path d="M 0,-9 L 1.5,-1.5 L 9,0 L 1.5,1.5 L 0,9 L -1.5,1.5 L -9,0 L -1.5,-1.5 Z"
            fill="#D49A4D"/>
    </symbol>

    <symbol id="petal" viewBox="-6 -6 12 12">
      <ellipse cx="0" cy="0" rx="5" ry="3" fill="url(#petalPink)" transform="rotate(45)"/>
    </symbol>

    <style>
      .twinkle-s { transform-origin: center; animation: twinkleS 2.5s ease-in-out infinite; }
      .twinkle-s.d1 { animation-delay: -0.4s; }
      .twinkle-s.d2 { animation-delay: -0.9s; animation-duration: 3s; }
      .twinkle-s.d3 { animation-delay: -1.4s; animation-duration: 2.2s; }
      .twinkle-s.d4 { animation-delay: -2s;   animation-duration: 2.8s; }
      @keyframes twinkleS {
        0%, 100% { opacity: 0.2; transform: scale(0.7); }
        50%      { opacity: 1;   transform: scale(1.2); }
      }

      .drift { animation: drift 14s linear infinite; }
      .drift.d1 { animation-delay: -2s;  animation-duration: 16s; }
      .drift.d2 { animation-delay: -5s;  animation-duration: 18s; }
      .drift.d3 { animation-delay: -9s;  animation-duration: 15s; }
      .drift.d4 { animation-delay: -12s; animation-duration: 20s; }
      @keyframes drift {
        from { transform: translate(0, -40px) rotate(0deg); opacity: 0; }
        10%, 90% { opacity: 0.7; }
        to   { transform: translate(40px, 360px) rotate(720deg); opacity: 0; }
      }

      .title {
        font-family: 'Playfair Display', Georgia, serif;
        font-weight: 300;
        font-size: 72px;
        fill: #6B4F3A;
        letter-spacing: 6px;
      }
      .tagline {
        font-family: Georgia, serif;
        font-size: 14px;
        fill: #6B4F3A;
        opacity: 0.7;
        font-style: italic;
        letter-spacing: 4px;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#creambg)"/>

  <!-- Soft brush stroke under title -->
  <path d="M 350,200 Q 600,170 850,210"
        stroke="#D49A4D" stroke-width="2"
        stroke-linecap="round" fill="none" opacity="0.4"/>

  <!-- Falling petals (drift) -->
  <use href="#petal" x="200"  y="0" width="22" height="22" class="drift"/>
  <use href="#petal" x="380"  y="0" width="18" height="18" class="drift d1"/>
  <use href="#petal" x="560"  y="0" width="24" height="24" class="drift d2"/>
  <use href="#petal" x="780"  y="0" width="20" height="20" class="drift d3"/>
  <use href="#petal" x="980"  y="0" width="22" height="22" class="drift d4"/>
  <use href="#petal" x="120"  y="0" width="16" height="16" class="drift d2"/>
  <use href="#petal" x="1100" y="0" width="20" height="20" class="drift d1"/>

  <!-- Sparkles around the title -->
  <use href="#sparkle" x="320"  y="90" width="18" height="18" class="twinkle-s"/>
  <use href="#sparkle" x="350"  y="180" width="14" height="14" class="twinkle-s d1"/>
  <use href="#sparkle" x="850"  y="90" width="16" height="16" class="twinkle-s d2"/>
  <use href="#sparkle" x="880"  y="180" width="20" height="20" class="twinkle-s d3"/>
  <use href="#sparkle" x="240"  y="130" width="12" height="12" class="twinkle-s d4"/>
  <use href="#sparkle" x="940"  y="130" width="14" height="14" class="twinkle-s"/>
  <use href="#sparkle" x="600"  y="55"  width="22" height="22" class="twinkle-s d2"/>
  <use href="#sparkle" x="600"  y="265" width="18" height="18" class="twinkle-s d3"/>

  <!-- Title -->
  <text x="600" y="160" text-anchor="middle" class="title">Mahiru</text>

  <!-- Tagline -->
  <text x="600" y="225" text-anchor="middle" class="tagline">always shipping, never finished</text>
</svg>
