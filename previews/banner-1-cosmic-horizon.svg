<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" role="img" aria-label="Cosmic Horizon banner">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2B2218"/>
      <stop offset="35%" stop-color="#6B4F3A"/>
      <stop offset="65%" stop-color="#D49A4D"/>
      <stop offset="90%" stop-color="#E87B6E"/>
      <stop offset="100%" stop-color="#F4C2C2"/>
    </linearGradient>
    <radialGradient id="sunglow" cx="50%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#FDFBF7" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#F4C2C2" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#F4C2C2" stop-opacity="0"/>
    </radialGradient>
    <style>
      .twinkle { animation: tw 3s ease-in-out infinite; }
      .twinkle.s2 { animation-delay: -1s; animation-duration: 2.5s; }
      .twinkle.s3 { animation-delay: -2s; animation-duration: 3.5s; }
      .twinkle.s4 { animation-delay: -0.5s; animation-duration: 2.8s; }
      @keyframes tw {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }
      .fade-in { opacity: 0; animation: fi 2s ease-out forwards; }
      .fade-in.d1 { animation-delay: 0.4s; }
      .fade-in.d2 { animation-delay: 1.2s; }
      .fade-in.d3 { animation-delay: 2s; }
      @keyframes fi { to { opacity: 1; } }
      .planet { transform-origin: 980px 65px; animation: rot 60s linear infinite; }
      @keyframes rot { to { transform: rotate(360deg); } }
    </style>
  </defs>

  <!-- Sky -->
  <rect width="1200" height="320" fill="url(#sky)"/>

  <!-- Sun glow at horizon center -->
  <circle cx="600" cy="320" r="220" fill="url(#sunglow)"/>

  <!-- Stars (top half) -->
  <g fill="#FDFBF7">
    <circle cx="80"  cy="35" r="1.3" class="twinkle"/>
    <circle cx="160" cy="62" r="1"   class="twinkle s2"/>
    <circle cx="230" cy="22" r="1.5" class="twinkle s3"/>
    <circle cx="310" cy="55" r="1.1" class="twinkle s4"/>
    <circle cx="390" cy="80" r="1.2" class="twinkle"/>
    <circle cx="460" cy="30" r="1.4" class="twinkle s2"/>
    <circle cx="530" cy="68" r="1"   class="twinkle s3"/>
    <circle cx="620" cy="42" r="1.3" class="twinkle s4"/>
    <circle cx="700" cy="20" r="1.1" class="twinkle"/>
    <circle cx="770" cy="65" r="1.4" class="twinkle s2"/>
    <circle cx="850" cy="38" r="1"   class="twinkle s3"/>
    <circle cx="1060" cy="45" r="1.2" class="twinkle s4"/>
    <circle cx="1130" cy="75" r="1.5" class="twinkle"/>
    <circle cx="50"  cy="100" r="1"   class="twinkle s2"/>
    <circle cx="350" cy="110" r="0.9" class="twinkle s3"/>
    <circle cx="900" cy="100" r="1.1" class="twinkle s4"/>
    <circle cx="1150" cy="20" r="1.3" class="twinkle"/>
    <circle cx="20"  cy="60" r="1.1" class="twinkle s3"/>
  </g>

  <!-- Distant planet with ring (top right) -->
  <g class="planet">
    <ellipse cx="980" cy="65" rx="55" ry="6" fill="none" stroke="#FDFBF7" stroke-opacity="0.35" stroke-width="1.5"/>
    <circle cx="980" cy="65" r="22" fill="#D49A4D" opacity="0.9"/>
    <circle cx="975" cy="60" r="4" fill="#6B4F3A" opacity="0.5"/>
    <circle cx="988" cy="70" r="3" fill="#6B4F3A" opacity="0.4"/>
  </g>

  <!-- Far horizon mountains (low silhouette) -->
  <path d="M 0,290 L 80,260 L 160,275 L 240,255 L 340,270 L 440,250 L 540,265 L 640,245 L 760,268 L 880,250 L 1000,265 L 1100,255 L 1200,275 L 1200,320 L 0,320 Z" fill="#3A2418" opacity="0.9"/>

  <!-- Tiny silhouette figure looking up -->
  <g fill="#1F1410" transform="translate(600,260)">
    <ellipse cx="0" cy="-22" rx="4.5" ry="5.5"/>
    <path d="M -4,-17 L 4,-17 L 5,-3 L -5,-3 Z"/>
    <line x1="-2" y1="-3" x2="-3" y2="10" stroke="#1F1410" stroke-width="2.5"/>
    <line x1="2" y1="-3" x2="3" y2="10" stroke="#1F1410" stroke-width="2.5"/>
  </g>

  <!-- Title -->
  <text x="600" y="140" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-size="64"
        fill="#FDFBF7" font-weight="300" class="fade-in d1"
        style="letter-spacing: 8px;">Mahiru</text>

  <!-- Tagline -->
  <text x="600" y="175" text-anchor="middle"
        font-family="Georgia, serif" font-size="13"
        fill="#FDFBF7" opacity="0.65" font-style="italic"
        class="fade-in d2"
        style="letter-spacing: 3px;">— from terminal, looking up —</text>

  <!-- Sub-quote -->
  <text x="600" y="225" text-anchor="middle"
        font-family="Georgia, serif" font-size="11"
        fill="#FDFBF7" opacity="0.5"
        class="fade-in d3"
        style="letter-spacing: 2px;">Mankind was born on Earth. It was never meant to die here.</text>
</svg>
