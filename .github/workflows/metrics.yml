name: Generate Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Languages metrics (with private repos)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Mahiruchan
          filename: dist/metrics.languages.svg
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: html, css, scss, less, dockerfile, makefile, shell, batchfile, jupyter notebook
          plugin_languages_details: bytes-size, percentage
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: programming, markup
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          config_timezone: Asia/Shanghai
          config_padding: 0, 8%

      - name: Fix permissions
        run: sudo chown -R $USER:$USER dist

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          keep_files: true
          allow_empty_commit: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
