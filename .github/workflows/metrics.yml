name: Generate Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Languages metrics (with private repos)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Mahiruchan
          filename: metrics.languages.svg
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          committer_branch: output
          committer_message: "chore: update language metrics"
          output_action: commit
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: html, css, scss, less, dockerfile, makefile, shell, batchfile, jupyter notebook, tex, roff
          plugin_languages_details: bytes-size, percentage
          plugin_languages_categories: programming, markup
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_threshold: 1%
          config_timezone: Asia/Shanghai
          config_padding: 0, 8%
